<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Login</title>
</head>
<body>
    <div class="left">
        <div class="overlay">
            <img src="odin-lined.png">
            <h2>ODIN</h2>
        </div>
    </div>
    <div class="right">
        <div class="intro">
            <p>This is not a real online service! You know you need something
            like this in your life to help you realize your deepest dreams.
            Sign up now to get started.</p>

            <p><b>You know</b> you want to.</p>
        </div>
        <div class="form-card">
            <h2>Let's do this!</h2>

            <div class="row">
            <div class="field">
                <label>FIRST NAME</label>
                <input type="text">
            </div>

            <div class="field">
                <label>LAST NAME</label>
                <input type="text">
            </div>
            </div>

            <div class="row">
            <div class="field">
                <label>EMAIL</label>
                <input type="email">
            </div>

            <div class="field">
                <label>PHONE NUMBER</label>
                <input type="tel">
            </div>
            </div>

            <div class="row">
            <div class="field">
                <label>PASSWORD</label>
                <input type="password">
            </div>

            <div class="field">
                <label>CONFIRM PASSWORD</label>
                <input type="password">
            </div>
            <div class="field">
                <button type="submit">SIGN UP</button>
            </div>
        </div>

    </div>

</div>
    
    
</body>
</html>
